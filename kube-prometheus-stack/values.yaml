# Opinionated values for the kube-prometheus-stack Helm chart.
# Install with:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm install obs prometheus-community/kube-prometheus-stack -f values.yaml
#
# Defaults here favour a small production cluster: modest retention, resource
# requests set, and Grafana locked down. Tune retention and storage for scale.

prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "8GB"
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        memory: 1Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    # Discover PrometheusRule and ServiceMonitor objects in every namespace,
    # not only those carrying the chart's release label.
    ruleSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
  config:
    route:
      group_by: ["alertname", "namespace", "job"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 3h
      receiver: "default"
      routes:
        - matchers:
            - severity = "critical"
          receiver: "pager"
          continue: true
    receivers:
      - name: "default"
      - name: "pager"
        # Wire this to a real integration (PagerDuty, Opsgenie, Slack webhook).
        # Left empty here so no secrets live in the repo.

grafana:
  defaultDashboardsEnabled: true
  adminPassword: ""  # set via --set or a sealed secret; never commit a password
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  # Load the dashboards in ../dashboards via a sidecar + ConfigMap in real use.
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
